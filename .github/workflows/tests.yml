name: tests

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: download_uv
        run: |
          pip install uv
          uv sync --all-extras

      - name: lint
        run: |
          uv run ruff check .
          uv run black --check .
          uv run mypy .

      - name: tests
        run: uv run pytest