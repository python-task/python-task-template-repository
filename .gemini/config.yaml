have_fun: false

memory_config:
  disabled: false

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: 12
  pull_request_opened:
    help: false
    summary: false
    code_review: true
    include_drafts: true

ignore_patterns:
  - ".venv/**"
  - "__pycache__/**"
  - "**/__pycache__/**"
  - "*.pyc"
  - ".mypy_cache/**"
  - ".pytest_cache/**"
  - ".ruff_cache/**"
  - ".coverage"
  - "htmlcov/**"
  - "dist/**"
  - "build/**"
